name: CD - Production (main branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: weather-dashboard
  AWS_REGION: us-east-1
  EKS_CLUSTER: weather-dashboard-staging
  K8S_NAMESPACE: staging

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Push Production Image to DockerHub
  # ─────────────────────────────────────────────
  push-production:
    name: 📦 Tag & Push Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:prod-${{ github.run_number }}

      - name: Build & Push Frontend (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:prod-${{ github.run_number }}

      - name: Images Pushed ✅
        run: |
          echo "✅ Production images pushed to DockerHub!"
          echo "Backend:  ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:prod-${{ github.run_number }}"
          echo "Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:prod-${{ github.run_number }}"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Production EKS
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production EKS
    runs-on: ubuntu-latest
    needs: push-production
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Create Namespace
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Secrets
        run: |
          kubectl create secret docker-registry dockerhub-registry-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKERHUB_TOKEN }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic weather-api-secret \
            --from-literal=OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Production
        env:
          IMAGE_TAG: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yaml
          sed -i "s|JFROG_REGISTRY|$DOCKERHUB_USERNAME|g" k8s/deployment.yaml
          kubectl apply -f k8s/ --namespace=${{ env.K8S_NAMESPACE }}

      - name: Rolling Deployment (Zero Downtime)
        run: |
          kubectl rollout status deployment/weather-backend \
            --namespace=${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/weather-frontend \
            --namespace=${{ env.K8S_NAMESPACE }} --timeout=180s

      - name: Get Production URL
        run: |
          PROD_URL=$(kubectl get ingress weather-ingress \
            --namespace=${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "🎉 PRODUCTION DEPLOYED!"
          echo "🌍 Production URL: https://$PROD_URL"

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "🎉 PRODUCTION DEPLOYMENT SUCCESSFUL"
          echo "📦 Image Tag: ${{ github.sha }}"
          echo "🏗️  Build:  #${{ github.run_number }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "⏰ Time: $(date -u)"
          echo "============================================"
 

          