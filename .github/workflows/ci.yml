name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
  security-events: write
  actions: read

env:
  REGISTRY: ${{ secrets.JFROG_REGISTRY }}
  IMAGE_NAME: weather-dashboard

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend Unit Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: 🧪 Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests with Coverage
        run: npm run test:ci

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  
  # ─────────────────────────────────────────────
  # JOB 3: Build Docker Images
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: backend-test
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/frontend-image.tar

      - name: Upload Images as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 4: Security Scan with Trivy
  # ─────────────────────────────────────────────
  security-scan:
    name: 🔒 Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Docker Images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load Docker Images
        run: |
          docker load --input /tmp/backend-image.tar
          docker load --input /tmp/frontend-image.tar

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}-backend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # Don't fail on vulnerabilities (set to 1 for strict)

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"
          category: "backend-security"
      
      # ─────────────────────────────────────────────
  # JOB 5: Push to DockerHub
  # ─────────────────────────────────────────────
  push-to-dockerhub:
    name: 📦 Push to DockerHub
    runs-on: ubuntu-latest
    needs: [backend-test, sonarqube, build, security-scan]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Debug username
        run: |
          echo "Username length: ${#DOCKERHUB_USER}"
          echo "First char: ${DOCKERHUB_USER:0:1}"
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:latest

      - name: Summary
        run: |
          echo "✅ Images pushed to DockerHub!"
          echo "Backend:  ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:${{ github.sha }}"
          echo "Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:${{ github.sha }}"

  # ─────────────────────────────────────────────
  # SUMMARY
  # ─────────────────────────────────────────────
  ci-success:
    name: ✅ CI Pipeline Complete
    runs-on: ubuntu-latest
    needs: [backend-test, build, security-scan]
    steps:
      - name: CI Passed
        run: |
          echo "============================================"
          echo "✅ All CI checks passed!"
          echo "🧪 Unit Tests: PASSED"
          echo "🐳 Docker Build: SUCCESS"
          echo "🔒 Trivy Scan: COMPLETE"
          echo "Commit: ${{ github.sha }}"
          echo "============================================"
