---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-backend
  labels:
    app: weather-backend
    version: "IMAGE_TAG"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero downtime rolling update
  template:
    metadata:
      labels:
        app: weather-backend
    spec:
      imagePullSecrets:
        - name: jfrog-registry-secret
      containers:
        - name: backend
          image: JFROG_REGISTRY/weather-dashboard-backend:IMAGE_TAG
          ports:
            - containerPort: 5000
          env:
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-api-secret
                  key: OPENWEATHER_API_KEY
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-frontend
  labels:
    app: weather-frontend
    version: "IMAGE_TAG"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: weather-frontend
    spec:
      imagePullSecrets:
        - name: jfrog-registry-secret
      containers:
        - name: frontend
          image: JFROG_REGISTRY/weather-dashboard-frontend:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
